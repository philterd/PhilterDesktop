# PDF build overlay for the offline Philter Desktop user guide (see philterd-website issue #469).
#
# Inherits the online site config (mkdocs.yml) and only adds the print-site plugin, which renders
# all pages into one combined HTML page (site/print_page/index.html). The online docs built from
# mkdocs.yml are unchanged. Installer\build-user-guide.ps1 then converts that single HTML page to
# PDF with headless Microsoft Edge (or Chrome), so there are no native PDF dependencies to install.
INHERIT: mkdocs.yml
plugins:
  - search
  - print-site:
      add_to_navigation: false
      print_page_title: "Philter Desktop User Guide"
      add_cover_page: true
      add_table_of_contents: true
      toc_title: "Table of Contents"

name: Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
      # A version bump publishes a new docs version (and moves "latest").
      - 'PhilterDesktop/PhilterDesktop.csproj'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure Git credentials
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - run: echo "cache_id=$(date --utc '+%V')" >> "$GITHUB_ENV"
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      # Publish versioned docs with mike. The docs version is the app's major.minor (read from the
      # .csproj <Version>), so bumping the app version publishes a new docs version. The "latest" alias is
      # moved to the newest version and kept as the default, so the site root redirects to it. mike writes
      # to the gh-pages branch that GitHub Pages serves; the Material theme renders the version selector
      # (extra.version.provider: mike in mkdocs.yml).
      - name: Deploy versioned docs
        run: |
          VERSION="$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' PhilterDesktop/PhilterDesktop.csproj | head -1)"
          DOCS_VERSION="${VERSION%.*}"
          echo "App version $VERSION -> docs version $DOCS_VERSION"
          mike deploy --config-file docs/mkdocs.yml --push --update-aliases "$DOCS_VERSION" latest
          mike set-default --config-file docs/mkdocs.yml --push latest

name: build-and-test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    # Windows is required: the app targets net10.0-windows (WinForms). Word
    # redaction uses the open-source Open XML SDK, so no license is needed.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Build/test via the test project, which references the app project and so compiles it too.
      - name: Restore
        run: dotnet restore PhilterDesktop.Tests/PhilterDesktop.Tests.csproj

      # Fail the build if any dependency (direct or transitive) has a known security advisory.
      # `dotnet list package --vulnerable` only prints and always exits 0, so its output is parsed
      # here to turn it into a gate. Auditing the test project covers the app project (and its
      # packages) transitively, since the test project references it.
      - name: Audit dependencies for known vulnerabilities
        shell: pwsh
        run: |
          $out = dotnet list PhilterDesktop.Tests/PhilterDesktop.Tests.csproj package --vulnerable --include-transitive 2>&1 | Out-String
          Write-Host $out
          if ($out -match 'has the following vulnerable packages') {
            Write-Error 'Vulnerable NuGet packages detected (see the report above). Update or pin the affected package(s).'
            exit 1
          }
          Write-Host 'No known-vulnerable packages found.'

      - name: Build
        run: dotnet build PhilterDesktop.Tests/PhilterDesktop.Tests.csproj -c Release --no-restore

      - name: Test (with code coverage)
        run: dotnet test PhilterDesktop.Tests/PhilterDesktop.Tests.csproj -c Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --settings PhilterDesktop.Tests/coverage.runsettings --results-directory TestResults

      # Enforce the coverage gate entirely on the runner — coverlet produces a local cobertura report
      # (no external coverage service, no upload, no account/token). Fails the build under 80% line
      # coverage of the testable layer (see PhilterDesktop.Tests/coverage.runsettings for what's scoped).
      - name: Enforce code-coverage threshold (80% line)
        shell: pwsh
        run: |
          $report = Get-ChildItem -Path TestResults -Recurse -Filter coverage.cobertura.xml | Select-Object -First 1
          if (-not $report) { Write-Error 'No coverage report was produced.'; exit 1 }
          [xml]$xml = Get-Content $report.FullName
          $rate = [double]$xml.coverage.'line-rate'
          $pct = [math]::Round($rate * 100, 1)
          Write-Host "Testable-layer line coverage: $pct% (threshold 80%)"
          if ($rate -lt 0.80) { Write-Error "Coverage $pct% is below the 80% threshold."; exit 1 }

      # Inno Setup is needed to compile the installer; it isn't preinstalled on the runner.
      # Chocolatey is available on windows-latest and installs ISCC to its standard location,
      # which build-setup.ps1 discovers automatically.
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      # Publish the app (win-x64, self-contained) and compile the installer using the same script
      # used for releases. Signing is disabled here (-NoSign): Azure Trusted Signing needs
      # credentials that aren't available in CI and would fail. Tests already ran above, so -NoTest
      # avoids running them a second time.
      - name: Build installer (unsigned)
        shell: pwsh
        run: ./Installer/build-setup.ps1 -NoSign -NoTest

      # - name: Upload installer artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: PhilterDesktop-Setup
      #     path: Installer/Output/*.exe
      #     if-no-files-found: error

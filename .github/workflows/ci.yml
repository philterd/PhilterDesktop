name: build-and-test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    # Windows is required: the app targets net10.0-windows (WinForms). Word
    # redaction uses the open-source Open XML SDK, so no license is needed.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Build/test the app and tests directly (not the .slnx): the solution also
      # contains the MSIX packaging project (Installer/*.wapproj), which the dotnet
      # CLI cannot build — it requires MSBuild/Visual Studio. Building the test
      # project compiles the app via its project reference.
      - name: Restore
        run: dotnet restore PhilterDesktop.Tests/PhilterDesktop.Tests.csproj

      - name: Build
        run: dotnet build PhilterDesktop.Tests/PhilterDesktop.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test PhilterDesktop.Tests/PhilterDesktop.Tests.csproj -c Release --no-build --verbosity normal
